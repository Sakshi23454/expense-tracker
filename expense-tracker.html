<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d9e0f5, #c7d3f5);
            min-height: 100vh;
        }

        .custom-navbar {
            background: linear-gradient(135deg, #4e73df, #224abe);
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 1.6rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .container {
            margin-top: 30px;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card-header {
            background: transparent;
            font-weight: 600;
            font-size: 1.2rem;
            text-align: center;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #4e73df;
            box-shadow: 0 0 6px rgba(78, 115, 223, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4e73df, #224abe);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #224abe, #4e73df);
        }

        .progress {
            height: 28px;
            border-radius: 20px;
            overflow: hidden;
            background-color: #e9ecef;
        }

        .progress-bar {
            font-size: 12px;
            font-weight: bold;
        }

        table {
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            text-align: center;
            vertical-align: middle;
        }

        thead {
            background: #111827;
        }

        .table-dark {
            background-color: #1f2937;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.08);
            transition: 0.2s;
        }

        .card-body strong {
            font-size: 0.9rem;
        }

        .card-body h4 {
            font-weight: bold;
            margin-top: 5px;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .custom-table {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 0;
        }

        .custom-table thead {
            background: linear-gradient(135deg, #9da3b3, #9ea1b4);
            color: white;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .custom-table th {
            border: none;
            padding: 12px;
        }

        .custom-table td {
            border: none;
            padding: 12px;
            font-size: 14px;
            vertical-align: middle;
        }

        .custom-table tbody tr {
            transition: 0.3s;
        }

        .custom-table tbody tr:hover {
            background-color: rgba(78, 115, 223, 0.08);
            transform: scale(1.01);
        }

        .badge-income {
            background: #1cc88a;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .badge-expense {
            background: #e74a3b;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        @media (max-width: 576px) {

            .custom-table td,
            .custom-table th {
                font-size: 12px;
                padding: 8px;
            }

            .navbar-brand {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg custom-navbar shadow">
        <div class="container">
            <a class="navbar-brand mx-auto fw-bold text-white" href="#">
                💰 Expense Tracker
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-sm-6 offset-sm-3">
                <div class="card">
                    <div class="card-header">Budget Planner</div>
                    <div class="card-body">
                        <div class="row">

                            <div class="col-sm-6">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="title" placeholder="enter title">
                                    <label>Enter Title</label>
                                </div>
                            </div>

                            <div class="col-sm-6">
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="amount" placeholder="enter amount">
                                    <label>Enter Amount</label>
                                </div>
                            </div>

                            <div class="col-sm-6">
                                <div class="form-floating mb-3">
                                    <select class="form-select" id="type">
                                        <option selected>Choose Type</option>
                                        <option value="income">Income</option>
                                        <option value="expense">Expense</option>
                                    </select>
                                    <label>Enter type</label>
                                </div>
                            </div>

                            <div class="col-sm-6">
                                <div class="form-floating mb-3">
                                    <select class="form-select" id="category">
                                        <option selected>Choose Category</option>
                                        <option value="food">Food</option>
                                        <option value="transport">Transport</option>
                                        <option value="rent">Rent</option>
                                        <option value="salary">Salary</option>
                                        <option value="investment">Investment</option>
                                    </select>
                                    <label>Enter Category</label>
                                </div>
                            </div>

                            <div class="col-sm-12">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="note" placeholder="enter note">
                                    <label>Enter Note</label>
                                </div>
                            </div>

                        </div>

                        <button onclick="handleClick()" type="button" class="btn btn-primary w-100 btn-lg">Add</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-sm-6 offset-sm-3">
                <div class="card">
                    <div class="card-body">

                        <div class="progress mb-3">
                            <div class="progress-bar bg-primary" id="rent">Rent</div>
                            <div class="progress-bar bg-warning" id="food">Food</div>
                            <div class="progress-bar bg-danger" id="transport">Transport</div>
                        </div>

                        <div class="row">
                            <div class="col-sm-4">
                                <div class="card text-center">
                                    <div class="card-body text-success">
                                        <strong>Income</strong>
                                        <h4 id="income">00</h4>
                                    </div>
                                </div>
                            </div>

                            <div class="col-sm-4">
                                <div class="card text-center">
                                    <div class="card-body text-danger">
                                        <strong>Expense</strong>
                                        <h4 id="expense">00</h4>
                                    </div>
                                </div>
                            </div>

                            <div class="col-sm-4">
                                <div class="card text-center">
                                    <div class="card-body text-primary">
                                        <strong>Balance</strong>
                                        <h4 id="balance">00</h4>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-sm-8 offset-sm-2">
                <div class="table-container">

                    <table class="table custom-table table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Amount</th>
                                <th>Type</th>
                                <th>Category</th>
                                <th>Note</th>
                            </tr>
                        </thead>

                        <tbody id="root"></tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const title = document.getElementById("title")
        const amount = document.getElementById("amount")
        const type = document.getElementById("type")
        const category = document.getElementById("category")
        const note = document.getElementById("note")

        const BANK = [
            { note: "fake note", title: "job 1", amount: 25000, type: "income", category: "salary" },
            { note: "fake note", title: "bike petrol", amount: 500, type: "expense", category: "transport" },
            { note: "fake note", title: "pizza", amount: 500, type: "expense", category: "food" },
            { note: "fake note", title: "test", amount: 500, type: "expense", category: "food" },
            { note: "fake note", title: "stocks", amount: 5000, type: "income", category: "investments" },
            { note: "fake note", title: "house rent", amount: 8500, type: "expense", category: "rent" },
        ]

        function handleClick() {
            const data = {
                title: title.value,
                amount: +amount.value,
                type: type.value,
                category: category.value,
                note: note.value,
            }
            BANK.unshift(data)
            display()
        }

        function display() {
            const root = document.getElementById('root')
            root.innerHTML = ""
            let i = 1
            for (const item of BANK) {
                root.innerHTML += `
                <tr>
                    <td>${i}</td>
                    <td>${item.title}</td>
                    <td>${item.amount}</td>
                    <td>${item.type}</td>
                    <td>${item.category}</td>
                    <td>${item.note}</td>
                </tr>`
                i++
            }

            const INC = BANK.filter(item => item.type === "income").reduce((sum, item) => sum + item.amount, 0)
            const EXP = BANK.filter(item => item.type === "expense").reduce((sum, item) => sum + item.amount, 0)

            document.getElementById("income").innerHTML = INC
            document.getElementById("expense").innerHTML = EXP
            document.getElementById("balance").innerHTML = INC - EXP

            const Food = BANK.filter(item => item.category === "food").reduce((sum, item) => sum + item.amount, 0) / EXP * 100
            const Rent = BANK.filter(item => item.category === "rent").reduce((sum, item) => sum + item.amount, 0) / EXP * 100
            const Transport = BANK.filter(item => item.category === "transport").reduce((sum, item) => sum + item.amount, 0) / EXP * 100

            document.getElementById("rent").style.width = `${Rent}%`
            document.getElementById("rent").innerHTML = `R ${Math.floor(Rent)}%`

            document.getElementById("food").style.width = `${Food}%`
            document.getElementById("food").innerHTML = `F ${Math.floor(Food)}%`

            document.getElementById("transport").innerHTML = `T ${Math.floor(Transport)}%`
        }

        display()
    </script>

</body>

</html>
